# Firebase App Hosting configuration for BlogOS
# Runs Next.js 14 with full SSR, API routes and middleware on Cloud Run.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # vCPU count — 1 is plenty for a marketing + auth-gated app until traffic grows
  cpu: 1
  # Memory — Next 14 build + SSR fits in 1 GiB; raise if OOM occurs
  memoryMiB: 1024
  # Max concurrent requests per instance
  concurrency: 80
  # Minimum warm instances (set to 0 to scale to zero; 1 removes cold starts)
  minInstances: 0
  maxInstances: 100

# Build-time environment variables (PUBLIC — safe to inline).
# Server-only secrets (FIREBASE_ADMIN_*, GROQ_API_KEY, FIRECRAWL_API_KEY,
# REPLICATE_API_KEY, WORDPRESS_*) MUST be set via Secret Manager and
# referenced here with `secret:` — NEVER commit them to this file.
env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://blogos.live
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: ""
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: buildwithesha.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: buildwithesha
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: buildwithesha.appspot.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: ""
    availability:
      - BUILD
      - RUNTIME

  # ─── Server-only secrets (provision in Google Secret Manager first) ───
  # Example:
  #   gcloud secrets create GROQ_API_KEY --replication-policy=automatic
  #   echo -n "gsk_..." | gcloud secrets versions add GROQ_API_KEY --data-file=-
  #   firebase apphosting:secrets:grantaccess GROQ_API_KEY --backend=blogos
  #
  # - variable: GROQ_API_KEY
  #   secret: GROQ_API_KEY
  # - variable: FIRECRAWL_API_KEY
  #   secret: FIRECRAWL_API_KEY
  # - variable: REPLICATE_API_KEY
  #   secret: REPLICATE_API_KEY
  # - variable: FIREBASE_ADMIN_PROJECT_ID
  #   secret: FIREBASE_ADMIN_PROJECT_ID
  # - variable: FIREBASE_ADMIN_CLIENT_EMAIL
  #   secret: FIREBASE_ADMIN_CLIENT_EMAIL
  # - variable: FIREBASE_ADMIN_PRIVATE_KEY
  #   secret: FIREBASE_ADMIN_PRIVATE_KEY
